<div class="dashboard">
  <div class="main-container">
    <header class="dashboard-header">
      <div>
        <h1>PingMe</h1>
        <p>Secure real-time messaging</p>
      </div>
      <div class="header-actions">
        <div class="logged-user"><i class="fa-solid fa-user"></i> {{ keycloakService.fullName }}</div>
        <button class="logout-btn" (click)="logout()"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</button>
      </div>
    </header>

    <div class="dashboard-content">
      <aside class="sidebar-panel">
        <app-chat-list [chats]="chats" [selectedChatId]="selectedChat?.id" (chatSelected)="chatSelected($event)" (favouriteToggled)="setFavourite($event)"/>
      </aside>
      <section class="chat-panel">
        <app-chat [selectedChat]="selectedChat" [messages]="chatMessages" [currentUserId]="keycloakService.userId" (sendTextMessage)="sendTextMessage($event)" (uploadMedia)="uploadMedia($event)" (markAsSeen)="markSelectedMessagesSeen()"/>
      </section>
    </div>
  </div>
</div>
