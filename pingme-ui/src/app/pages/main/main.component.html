<div class="workspace">
  <header class="workspace__header">
    <div>
      <h1>PingMe</h1>
      <small>{{ keycloakService.fullName }}</small>
    </div>
    <button type="button" (click)="logout()">Logout</button>
  </header>

  <div class="workspace__body">
    <app-chat-list
      [chats]="chats"
      [selectedChatId]="selectedChat?.id"
      (chatSelected)="onChatSelected($event)"
    />

    <section class="chat-panel">
      @if (selectedChat) {
        <div class="chat-panel__title">
          <h2>{{ selectedChat.name }}</h2>
          <small>{{ selectedChat.lastMessageTime | date:'dd/MM/yyyy HH:mm' }}</small>
        </div>

        <div #messageContainer class="chat-panel__messages">
          @for (message of chatMessages; track message.id ?? $index) {
            <app-message-item [message]="message" [mine]="isSelfMessage(message)" />
          }
        </div>

        <div class="chat-panel__composer">
          <input #inputFile type="file" hidden accept=".jpg,.jpeg,.png,.svg" (change)="uploadMedia($event.target)">
          <button type="button" (click)="inputFile.click()">Attach</button>
          <input
            type="text"
            placeholder="Write a message"
            [(ngModel)]="messageContent"
            (keydown.enter)="sendMessage()"
          />
          <button type="button" (click)="sendMessage()">Send</button>
        </div>
      } @else {
        <div class="chat-panel__empty">Select a conversation to start messaging.</div>
      }
    </section>
  </div>
</div>
